
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>럭키 로또 번호 생성기</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><span class="highlight">럭키</span> 로또 번호 생성기</h1>
            <p>버튼을 클릭하여 행운의 번호를 받아보세요!</p>
        </header>

        <main class="lotto-generator">
            <div class="lotto-card">
                <h2>생성된 로또 번호</h2>
                <div class="ball-container" id="lotto-balls">
                    <!-- JavaScript로 생성된 공이 여기에 추가됩니다 -->
                </div>
                <button id="generate-btn" class="generate-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-play"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    <span>번호 생성하기</span>
                </button>
            </div>

            <div class="history-card">
                <h2>최근 생성 번호</h2>
                <ul id="history-list" class="history-list">
                    <!-- JavaScript로 생성된 기록이 여기에 추가됩니다 -->
                </ul>
            </div>
        </main>
    </div>

    <script src="main.js"></script>
</body>
</html>
